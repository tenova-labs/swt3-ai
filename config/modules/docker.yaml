module: docker
module_name: "Docker Container Runtime"
platform: linux
detect: "docker info >/dev/null 2>&1 && echo 1 || echo 0"
detect_timeout: 10
family: "CM"
family_name: "Configuration Management"
controls:
  - id: "CM-7.3"
    parent_control: "CM-7"
    name: "Docker - No Privileged Containers Running"
    command: "docker ps -q 2>/dev/null | xargs -r docker inspect --format '{{.HostConfig.Privileged}}' 2>/dev/null | grep -c true || echo 0"
    factor_a: 0
    factor_a_label: "max_privileged_containers"
    factor_b_source: "stdout_int"
    factor_b_label: "privileged_containers_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-7"
    nist_800_171_ref: "3.4.8"

  - id: "CM-7.4"
    parent_control: "CM-7"
    name: "Docker - No Containers Running as Root"
    command: "docker ps -q 2>/dev/null | xargs -r docker inspect --format '{{.Config.User}}' 2>/dev/null | grep -cv '^$' | awk '{print ($1 > 0 ? 1 : 0)}' || echo 0"
    factor_a: 1
    factor_a_label: "non_root_containers_required"
    factor_b_source: "stdout_int"
    factor_b_label: "containers_with_user"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-7"
    nist_800_171_ref: "3.4.6"

  - id: "SC-7.10"
    parent_control: "SC-7"
    name: "Docker - Published Port Count"
    command: "docker ps --format '{{.Ports}}' 2>/dev/null | grep -co '0.0.0.0' || echo 0"
    factor_a: 10
    factor_a_label: "max_published_ports"
    factor_b_source: "stdout_int"
    factor_b_label: "published_ports_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "SI-2.3"
    parent_control: "SI-2"
    name: "Docker - Images Without Recent Updates"
    command: "docker images --format '{{.CreatedSince}}' 2>/dev/null | grep -c 'months\\|years' || echo 0"
    factor_a: 5
    factor_a_label: "max_stale_images"
    factor_b_source: "stdout_int"
    factor_b_label: "stale_images_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-2"
    nist_800_171_ref: "3.14.1"

  - id: "AU-2.4"
    parent_control: "AU-2"
    name: "Docker - Logging Driver Configured"
    command: "docker info --format '{{.LoggingDriver}}' 2>/dev/null | grep -cv 'none' || echo 0"
    factor_a: 1
    factor_a_label: "logging_driver_required"
    factor_b_source: "stdout_int"
    factor_b_label: "logging_driver_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-2"
    nist_800_171_ref: "3.3.1"

  - id: "SC-28.3"
    parent_control: "SC-28"
    name: "Docker - Content Trust Enabled"
    command: "echo ${DOCKER_CONTENT_TRUST:-0}"
    factor_a: 1
    factor_a_label: "content_trust_required"
    factor_b_source: "stdout_int"
    factor_b_label: "content_trust_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SC-28"
    nist_800_171_ref: "3.13.16"
