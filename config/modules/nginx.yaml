module: nginx
module_name: "NGINX Web Server"
platform: linux
detect: "systemctl is-active nginx >/dev/null 2>&1 && echo 1 || nginx -v 2>/dev/null && echo 1 || echo 0"
detect_timeout: 5
family: "SC"
family_name: "System and Communications Protection"
controls:
  - id: "SC-8.4"
    parent_control: "SC-8"
    name: "NGINX TLS - Minimum TLS 1.2 Enforced"
    command: "nginx -T 2>/dev/null | grep -cP 'ssl_protocols.*TLSv1\\.[23]' || echo 0"
    factor_a: 1
    factor_a_label: "tls_config_required"
    factor_b_source: "stdout_int"
    factor_b_label: "tls_config_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-8"
    nist_800_171_ref: "3.13.8"

  - id: "SC-8.5"
    parent_control: "SC-8"
    name: "NGINX TLS - Strong Ciphers Configured"
    command: "nginx -T 2>/dev/null | grep -c 'ssl_ciphers' || echo 0"
    factor_a: 1
    factor_a_label: "cipher_config_required"
    factor_b_source: "stdout_int"
    factor_b_label: "cipher_config_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-8"
    nist_800_171_ref: "3.13.8"

  - id: "CM-6.6"
    parent_control: "CM-6"
    name: "NGINX Configuration - Server Tokens Disabled"
    command: "nginx -T 2>/dev/null | grep -c 'server_tokens.*off' || echo 0"
    factor_a: 1
    factor_a_label: "server_tokens_off_required"
    factor_b_source: "stdout_int"
    factor_b_label: "server_tokens_off"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-6"
    nist_800_171_ref: "3.4.2"

  - id: "CM-6.7"
    parent_control: "CM-6"
    name: "NGINX Configuration - Security Headers Present"
    command: "nginx -T 2>/dev/null | grep -cP 'X-Content-Type-Options|X-Frame-Options|Strict-Transport-Security' || echo 0"
    factor_a: 1
    factor_a_label: "min_security_headers"
    factor_b_source: "stdout_int"
    factor_b_label: "security_headers_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-6"
    nist_800_171_ref: "3.4.2"

  - id: "AU-2.3"
    parent_control: "AU-2"
    name: "NGINX Audit - Access Logging Enabled"
    command: "nginx -T 2>/dev/null | grep -c 'access_log' || echo 0"
    factor_a: 1
    factor_a_label: "access_log_required"
    factor_b_source: "stdout_int"
    factor_b_label: "access_log_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-2"
    nist_800_171_ref: "3.3.1"
