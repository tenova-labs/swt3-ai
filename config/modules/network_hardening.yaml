module: network_hardening
module_name: "Network Hardening"
platform: linux
detect: "echo 1"
detect_timeout: 2
family: "SC"
family_name: "System and Communications Protection"
controls:
  - id: "SC-7.11"
    parent_control: "SC-7"
    name: "Network - UFW/Firewall Active"
    command: "ufw status 2>/dev/null | grep -qc 'Status: active' && echo 1 || systemctl is-active nftables >/dev/null 2>&1 && echo 1 || iptables -L INPUT 2>/dev/null | grep -qc 'DROP\\|REJECT' && echo 1 || echo 0"
    factor_a: 1
    factor_a_label: "firewall_required"
    factor_b_source: "stdout_int"
    factor_b_label: "firewall_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "SC-7.12"
    parent_control: "SC-7"
    name: "Network - Default Deny Inbound Policy"
    command: "ufw status verbose 2>/dev/null | grep -c 'Default: deny (incoming)' || iptables -L INPUT 2>/dev/null | head -1 | grep -c 'policy DROP' || echo 0"
    factor_a: 1
    factor_a_label: "default_deny_required"
    factor_b_source: "stdout_int"
    factor_b_label: "default_deny_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "SC-5.2"
    parent_control: "SC-5"
    name: "Network - TCP SYN Cookies Enabled"
    command: "cat /proc/sys/net/ipv4/tcp_syncookies 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "syncookies_required"
    factor_b_source: "stdout_int"
    factor_b_label: "syncookies_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-5"
    nist_800_171_ref: "3.13.1"

  - id: "SC-7.13"
    parent_control: "SC-7"
    name: "Network - Reverse Path Filtering Enabled"
    command: "cat /proc/sys/net/ipv4/conf/all/rp_filter 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "rp_filter_required"
    factor_b_source: "stdout_int"
    factor_b_label: "rp_filter_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "SC-7.14"
    parent_control: "SC-7"
    name: "Network - ICMP Redirects Disabled"
    command: "cat /proc/sys/net/ipv4/conf/all/accept_redirects 2>/dev/null || echo 1"
    factor_a: 0
    factor_a_label: "redirects_must_be_zero"
    factor_b_source: "stdout_int"
    factor_b_label: "accept_redirects_value"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "SC-7.15"
    parent_control: "SC-7"
    name: "Network - Source Routing Disabled"
    command: "cat /proc/sys/net/ipv4/conf/all/accept_source_route 2>/dev/null || echo 1"
    factor_a: 0
    factor_a_label: "source_route_must_be_zero"
    factor_b_source: "stdout_int"
    factor_b_label: "accept_source_route_value"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "SC-7.16"
    parent_control: "SC-7"
    name: "Network - IPv6 Disabled or Hardened"
    command: "cat /proc/sys/net/ipv6/conf/all/disable_ipv6 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "ipv6_disabled_required"
    factor_b_source: "stdout_int"
    factor_b_label: "ipv6_disabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "AU-8.2"
    parent_control: "AU-8"
    name: "Network - NTP/Chrony Time Sync Active"
    command: "systemctl is-active chronyd >/dev/null 2>&1 && echo 1 || systemctl is-active ntp >/dev/null 2>&1 && echo 1 || systemctl is-active systemd-timesyncd >/dev/null 2>&1 && echo 1 || echo 0"
    factor_a: 1
    factor_a_label: "time_sync_required"
    factor_b_source: "stdout_int"
    factor_b_label: "time_sync_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-8"
    nist_800_171_ref: "3.3.7"

  - id: "CM-7.6"
    parent_control: "CM-7"
    name: "Network - Unnecessary Listening Services"
    command: "ss -tlnp 2>/dev/null | grep LISTEN | wc -l || echo 99"
    factor_a: 20
    factor_a_label: "max_listening_services"
    factor_b_source: "stdout_int"
    factor_b_label: "listening_services_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-7"
    nist_800_171_ref: "3.4.6"

  - id: "SC-23.2"
    parent_control: "SC-23"
    name: "Network - DNS Resolver Points to Trusted Servers"
    command: "grep -cP '^nameserver\\s+(127\\.0\\.0\\.1|::1|1\\.1\\.1\\.1|8\\.8\\.8\\.8|9\\.9\\.9\\.9)' /etc/resolv.conf 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "trusted_dns_required"
    factor_b_source: "stdout_int"
    factor_b_label: "trusted_dns_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-23"
    nist_800_171_ref: "3.13.15"

  - id: "SC-7.17"
    parent_control: "SC-7"
    name: "Network - No Wireless Interfaces Active"
    command: "ip link show 2>/dev/null | grep -c 'wlan\\|wlp\\|wifi' || echo 0"
    factor_a: 0
    factor_a_label: "max_wireless_interfaces"
    factor_b_source: "stdout_int"
    factor_b_label: "wireless_interfaces_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "SC-7.18"
    parent_control: "SC-7"
    name: "Network - Bogon/Martian Logging Enabled"
    command: "cat /proc/sys/net/ipv4/conf/all/log_martians 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "martian_logging_required"
    factor_b_source: "stdout_int"
    factor_b_label: "martian_logging_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"
