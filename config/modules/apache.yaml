module: apache
module_name: "Apache HTTP Server"
platform: linux
detect: "apachectl -v >/dev/null 2>&1 && echo 1 || apache2ctl -v >/dev/null 2>&1 && echo 1 || httpd -v >/dev/null 2>&1 && echo 1 || echo 0"
detect_timeout: 5
family: "SC"
family_name: "System and Communications Protection"
controls:
  - id: "SC-8.6"
    parent_control: "SC-8"
    name: "Apache TLS - Minimum TLS 1.2 Enforced"
    command: "apachectl -M 2>/dev/null | grep -qc ssl_module && (apachectl -S 2>/dev/null; cat /etc/apache2/sites-enabled/*.conf /etc/httpd/conf.d/ssl.conf 2>/dev/null) | grep -cP 'SSLProtocol.*all.*-SSLv|TLSv1\\.[23]' || echo 0"
    factor_a: 1
    factor_a_label: "tls_config_required"
    factor_b_source: "stdout_int"
    factor_b_label: "tls_config_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-8"
    nist_800_171_ref: "3.13.8"

  - id: "SC-8.7"
    parent_control: "SC-8"
    name: "Apache TLS - Strong Cipher Suite"
    command: "(cat /etc/apache2/sites-enabled/*.conf /etc/httpd/conf.d/ssl.conf 2>/dev/null) | grep -c 'SSLCipherSuite' || echo 0"
    factor_a: 1
    factor_a_label: "cipher_config_required"
    factor_b_source: "stdout_int"
    factor_b_label: "cipher_config_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-8"
    nist_800_171_ref: "3.13.8"

  - id: "CM-6.9"
    parent_control: "CM-6"
    name: "Apache Configuration - ServerTokens Minimal"
    command: "(cat /etc/apache2/conf-enabled/security.conf /etc/httpd/conf/httpd.conf 2>/dev/null) | grep -cP 'ServerTokens\\s+(Prod|Major|Minor|Min|Minimal|OS)' || echo 0"
    factor_a: 1
    factor_a_label: "server_tokens_restricted"
    factor_b_source: "stdout_int"
    factor_b_label: "server_tokens_set"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-6"
    nist_800_171_ref: "3.4.2"

  - id: "CM-6.10"
    parent_control: "CM-6"
    name: "Apache Configuration - ServerSignature Off"
    command: "(cat /etc/apache2/conf-enabled/security.conf /etc/httpd/conf/httpd.conf 2>/dev/null) | grep -c 'ServerSignature Off' || echo 0"
    factor_a: 1
    factor_a_label: "signature_off_required"
    factor_b_source: "stdout_int"
    factor_b_label: "signature_off"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-6"
    nist_800_171_ref: "3.4.2"

  - id: "CM-6.11"
    parent_control: "CM-6"
    name: "Apache Configuration - Security Headers Present"
    command: "(cat /etc/apache2/sites-enabled/*.conf /etc/httpd/conf.d/*.conf 2>/dev/null) | grep -cP 'X-Content-Type-Options|X-Frame-Options|Strict-Transport-Security' || echo 0"
    factor_a: 1
    factor_a_label: "min_security_headers"
    factor_b_source: "stdout_int"
    factor_b_label: "security_headers_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-6"
    nist_800_171_ref: "3.4.2"

  - id: "CM-6.12"
    parent_control: "CM-6"
    name: "Apache Configuration - Directory Listing Disabled"
    command: "(cat /etc/apache2/apache2.conf /etc/httpd/conf/httpd.conf 2>/dev/null) | grep -c 'Options.*-Indexes' || echo 0"
    factor_a: 1
    factor_a_label: "indexes_disabled_required"
    factor_b_source: "stdout_int"
    factor_b_label: "indexes_disabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-6"
    nist_800_171_ref: "3.4.2"

  - id: "AU-2.5"
    parent_control: "AU-2"
    name: "Apache Audit - Access Logging Enabled"
    command: "(cat /etc/apache2/sites-enabled/*.conf /etc/httpd/conf/httpd.conf 2>/dev/null) | grep -c 'CustomLog\\|TransferLog' || echo 0"
    factor_a: 1
    factor_a_label: "access_log_required"
    factor_b_source: "stdout_int"
    factor_b_label: "access_log_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-2"
    nist_800_171_ref: "3.3.1"

  - id: "AU-2.6"
    parent_control: "AU-2"
    name: "Apache Audit - Error Logging Configured"
    command: "(cat /etc/apache2/apache2.conf /etc/httpd/conf/httpd.conf 2>/dev/null) | grep -c 'ErrorLog' || echo 0"
    factor_a: 1
    factor_a_label: "error_log_required"
    factor_b_source: "stdout_int"
    factor_b_label: "error_log_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-2"
    nist_800_171_ref: "3.3.1"

  - id: "CM-7.5"
    parent_control: "CM-7"
    name: "Apache - Unnecessary Modules Disabled"
    command: "apachectl -M 2>/dev/null | grep -cP 'autoindex_module|status_module|info_module|cgi_module' || echo 0"
    factor_a: 1
    factor_a_label: "max_risky_modules"
    factor_b_source: "stdout_int"
    factor_b_label: "risky_modules_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-7"
    nist_800_171_ref: "3.4.6"

  - id: "AC-3.4"
    parent_control: "AC-3"
    name: "Apache Access Control - .htaccess Override Restricted"
    command: "(cat /etc/apache2/apache2.conf /etc/httpd/conf/httpd.conf 2>/dev/null) | grep -c 'AllowOverride.*None' || echo 0"
    factor_a: 1
    factor_a_label: "override_restricted"
    factor_b_source: "stdout_int"
    factor_b_label: "override_none_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-3"
    nist_800_171_ref: "3.1.1"
