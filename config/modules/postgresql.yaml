module: postgresql
module_name: "PostgreSQL Database Server"
platform: linux
detect: "pg_isready -q 2>/dev/null && echo 1 || echo 0"
detect_timeout: 5
family: "SC"
family_name: "System and Communications Protection"
controls:
  - id: "SC-28.2"
    parent_control: "SC-28"
    name: "Database Encryption at Rest - Postgres Data Checksums"
    command: "psql -h /var/run/postgresql -U postgres -tAc \"SELECT CASE WHEN current_setting('data_checksums') = 'on' THEN 1 ELSE 0 END;\" 2>/dev/null || psql -tAc \"SELECT CASE WHEN current_setting('data_checksums') = 'on' THEN 1 ELSE 0 END;\" 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "data_checksums_required"
    factor_b_source: "stdout_int"
    factor_b_label: "data_checksums_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SC-28"
    nist_800_171_ref: "3.13.16"

  - id: "SC-8.3"
    parent_control: "SC-8"
    name: "Database Transport Encryption - Postgres SSL Active"
    command: "psql -h /var/run/postgresql -U postgres -tAc \"SELECT CASE WHEN current_setting('ssl') = 'on' THEN 1 ELSE 0 END;\" 2>/dev/null || psql -tAc \"SELECT CASE WHEN current_setting('ssl') = 'on' THEN 1 ELSE 0 END;\" 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "ssl_required"
    factor_b_source: "stdout_int"
    factor_b_label: "ssl_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-8"
    nist_800_171_ref: "3.13.8"

  - id: "AC-3.2"
    parent_control: "AC-3"
    name: "Database Access Enforcement - Postgres Row-Level Security"
    command: "psql -h /var/run/postgresql -U postgres -tAc \"SELECT count(*) FROM pg_catalog.pg_policies;\" 2>/dev/null || psql -tAc \"SELECT count(*) FROM pg_catalog.pg_policies;\" 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "min_rls_policies"
    factor_b_source: "stdout_int"
    factor_b_label: "rls_policies_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-3"
    nist_800_171_ref: "3.1.1"

  - id: "AU-2.2"
    parent_control: "AU-2"
    name: "Database Audit Logging - Postgres Log Connections"
    command: "psql -h /var/run/postgresql -U postgres -tAc \"SELECT CASE WHEN current_setting('log_connections') = 'on' THEN 1 ELSE 0 END;\" 2>/dev/null || psql -tAc \"SELECT CASE WHEN current_setting('log_connections') = 'on' THEN 1 ELSE 0 END;\" 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "log_connections_required"
    factor_b_source: "stdout_int"
    factor_b_label: "log_connections_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-2"
    nist_800_171_ref: "3.3.1"

  - id: "IA-5.7"
    parent_control: "IA-5"
    name: "Database Authenticator - Postgres Password Encryption"
    command: "psql -h /var/run/postgresql -U postgres -tAc \"SELECT CASE WHEN current_setting('password_encryption') IN ('scram-sha-256','md5') THEN 1 ELSE 0 END;\" 2>/dev/null || psql -tAc \"SELECT CASE WHEN current_setting('password_encryption') IN ('scram-sha-256','md5') THEN 1 ELSE 0 END;\" 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "password_encryption_required"
    factor_b_source: "stdout_int"
    factor_b_label: "password_encryption_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.10"

  - id: "AC-6.4"
    parent_control: "AC-6"
    name: "Database Least Privilege - Postgres Superuser Count"
    command: "psql -h /var/run/postgresql -U postgres -tAc \"SELECT count(*) FROM pg_roles WHERE rolsuper = true;\" 2>/dev/null || psql -tAc \"SELECT count(*) FROM pg_roles WHERE rolsuper = true;\" 2>/dev/null || echo 99"
    factor_a: 2
    factor_a_label: "max_superusers"
    factor_b_source: "stdout_int"
    factor_b_label: "superusers_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-6"
    nist_800_171_ref: "3.1.5"
