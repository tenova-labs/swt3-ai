module: antivirus
module_name: "Antivirus / Endpoint Protection"
platform: linux
detect: "clamscan --version >/dev/null 2>&1 && echo 1 || which rkhunter >/dev/null 2>&1 && echo 1 || echo 0"
detect_timeout: 5
family: "SI"
family_name: "System and Information Integrity"
controls:
  - id: "SI-3.4"
    parent_control: "SI-3"
    name: "Antivirus - ClamAV/AV Engine Installed"
    command: "clamscan --version >/dev/null 2>&1 && echo 1 || clamdscan --version >/dev/null 2>&1 && echo 1 || echo 0"
    factor_a: 1
    factor_a_label: "av_engine_required"
    factor_b_source: "stdout_int"
    factor_b_label: "av_engine_installed"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-3"
    nist_800_171_ref: "3.14.2"

  - id: "SI-3.5"
    parent_control: "SI-3"
    name: "Antivirus - ClamAV Daemon Running"
    command: "systemctl is-active clamav-daemon >/dev/null 2>&1 && echo 1 || systemctl is-active clamd >/dev/null 2>&1 && echo 1 || pgrep -c clamd 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "av_daemon_required"
    factor_b_source: "stdout_int"
    factor_b_label: "av_daemon_running"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-3"
    nist_800_171_ref: "3.14.2"

  - id: "SI-3.6"
    parent_control: "SI-3"
    name: "Antivirus - Virus Definitions Current (< 7 days)"
    command: "find /var/lib/clamav/ -name 'daily.c?d' -mtime -7 2>/dev/null | wc -l || echo 0"
    factor_a: 1
    factor_a_label: "recent_definitions_required"
    factor_b_source: "stdout_int"
    factor_b_label: "recent_definitions_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-3"
    nist_800_171_ref: "3.14.2"

  - id: "SI-3.7"
    parent_control: "SI-3"
    name: "Antivirus - Freshclam Auto-Update Enabled"
    command: "systemctl is-active clamav-freshclam >/dev/null 2>&1 && echo 1 || systemctl is-active freshclamd >/dev/null 2>&1 && echo 1 || grep -c 'DatabaseMirror' /etc/clamav/freshclam.conf 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "auto_update_required"
    factor_b_source: "stdout_int"
    factor_b_label: "auto_update_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-3"
    nist_800_171_ref: "3.14.2"

  - id: "SI-4.3"
    parent_control: "SI-4"
    name: "Endpoint Protection - Rootkit Hunter Installed"
    command: "which rkhunter >/dev/null 2>&1 && echo 1 || which chkrootkit >/dev/null 2>&1 && echo 1 || echo 0"
    factor_a: 1
    factor_a_label: "rootkit_scanner_required"
    factor_b_source: "stdout_int"
    factor_b_label: "rootkit_scanner_installed"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-4"
    nist_800_171_ref: "3.14.6"

  - id: "SI-4.4"
    parent_control: "SI-4"
    name: "Endpoint Protection - AIDE/File Integrity Monitoring"
    command: "which aide >/dev/null 2>&1 && echo 1 || which tripwire >/dev/null 2>&1 && echo 1 || which osquery >/dev/null 2>&1 && echo 1 || echo 0"
    factor_a: 1
    factor_a_label: "fim_required"
    factor_b_source: "stdout_int"
    factor_b_label: "fim_installed"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-4"
    nist_800_171_ref: "3.14.6"
