family: "CM"
family_name: "Configuration Management"
controls:
  - id: "CM-2.1"
    parent_control: "CM-2"
    name: "Baseline Configuration - Installed Packages Count"
    command: "dpkg -l 2>/dev/null | grep -c '^ii' || rpm -qa 2>/dev/null | wc -l"
    factor_a: 900
    factor_a_label: "max_installed_packages"
    factor_b_source: "stdout_int"
    factor_b_label: "installed_packages"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-2"
    nist_800_171_ref: "3.4.1"

  - id: "CM-3.1"
    parent_control: "CM-3"
    name: "Configuration Change Control - Cron Jobs Count"
    command: "find /etc/cron.d /etc/cron.daily /etc/cron.hourly /etc/cron.weekly /etc/cron.monthly -type f 2>/dev/null | wc -l"
    factor_a: 25
    factor_a_label: "max_cron_jobs"
    factor_b_source: "stdout_int"
    factor_b_label: "cron_jobs_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-3"
    nist_800_171_ref: "3.4.3"

  - id: "CM-5.1"
    parent_control: "CM-5"
    name: "Access Restrictions for Change - /etc Owned by Root"
    command: "find /etc -maxdepth 1 -not -user root -type f 2>/dev/null | wc -l"
    factor_a: 0
    factor_a_label: "max_non_root_etc_files"
    factor_b_source: "stdout_int"
    factor_b_label: "non_root_etc_files"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-5"
    nist_800_171_ref: "3.4.5"

  - id: "CM-6.1"
    parent_control: "CM-6"
    name: "Configuration Settings - SSH Root Login Disabled"
    command: "sshd -T 2>/dev/null | grep -ic 'permitrootlogin no' || grep -ic '^\\s*PermitRootLogin\\s\\+no$' /etc/ssh/sshd_config 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "ssh_root_login_restricted"
    factor_b_source: "stdout_int"
    factor_b_label: "root_login_restriction_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-6"
    nist_800_171_ref: "3.4.2"

  - id: "CM-6.2"
    parent_control: "CM-6"
    name: "Configuration Settings - SSH Password Auth Disabled"
    command: "sshd -T 2>/dev/null | grep -ic 'passwordauthentication no' || grep -ic 'PasswordAuthentication.*no' /etc/ssh/sshd_config 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "password_auth_disabled"
    factor_b_source: "stdout_int"
    factor_b_label: "password_auth_disabled_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-6"
    nist_800_171_ref: "3.4.2"

  - id: "CM-6.3"
    parent_control: "CM-6"
    name: "Configuration Settings - Core Dumps Disabled"
    command: "grep -c 'hard.*core.*0' /etc/security/limits.conf 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "core_dumps_disabled_required"
    factor_b_source: "stdout_int"
    factor_b_label: "core_dumps_disabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-6"
    nist_800_171_ref: "3.4.2"

  - id: "CM-6.4"
    parent_control: "CM-6"
    name: "Configuration Settings - SSH MaxAuthTries"
    command: "sshd -T 2>/dev/null | grep -oP 'maxauthtries\\s+\\K[0-9]+' || grep -oP 'MaxAuthTries\\s+\\K[0-9]+' /etc/ssh/sshd_config 2>/dev/null || echo 6"
    factor_a: 4
    factor_a_label: "max_auth_tries_allowed"
    factor_b_source: "stdout_int"
    factor_b_label: "max_auth_tries_configured"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-6"
    nist_800_171_ref: "3.4.2"

  - id: "CM-7.1"
    parent_control: "CM-7"
    name: "Least Functionality - Running Services Count"
    command: "systemctl list-units --type=service --state=running --no-legend 2>/dev/null | wc -l"
    factor_a: 80
    factor_a_label: "max_running_services"
    factor_b_source: "stdout_int"
    factor_b_label: "actual_running_services"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-7"
    nist_800_171_ref: "3.4.6"

  - id: "CM-7.2"
    parent_control: "CM-7"
    name: "Least Functionality - Unnecessary Network Protocols"
    command: "lsmod 2>/dev/null | grep -ic 'dccp\\|sctp\\|rds\\|tipc' || echo 0"
    factor_a: 0
    factor_a_label: "max_unnecessary_protocols"
    factor_b_source: "stdout_int"
    factor_b_label: "unnecessary_protocols_loaded"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-7"
    nist_800_171_ref: "3.4.7"

  - id: "CM-7.3"
    parent_control: "CM-7"
    name: "Least Functionality - Open Listening Ports"
    command: "ss -tlnp 2>/dev/null | tail -n +2 | wc -l"
    factor_a: 25
    factor_a_label: "max_listening_ports"
    factor_b_source: "stdout_int"
    factor_b_label: "listening_ports"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "CM-7"
    nist_800_171_ref: "3.4.7"
