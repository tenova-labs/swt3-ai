family: "MP"
family_name: "Media Protection"
controls:
  - id: "MP-1.1"
    parent_control: "MP-1"
    name: "Media Protection Policy Document"
    check_type: "policy_file"
    policy_path: "/opt/axiom/policies/mp-media-protection.md"
    policy_template: "mp-media-protection"
    command: "FILE=/opt/axiom/policies/mp-media-protection.md; test -f \"$FILE\" && echo $(( ($(date +%s) - $(stat -c %Y \"$FILE\")) / 86400 )) || echo 9999"
    factor_a: 365
    factor_a_label: "max_policy_age_days"
    factor_b_source: "stdout_int"
    factor_b_label: "policy_age_days"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    attestation_prompt: "Confirm your organization has a current media protection policy."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "MP-1"
    nist_800_171_ref: "3.8.1"

  - id: "MP-2.1"
    parent_control: "MP-2"
    name: "Media Access Control - USB Block Devices"
    command: "lsblk -S 2>/dev/null | grep -c 'usb' || echo 0"
    factor_a: 0
    factor_a_label: "max_usb_block_devices"
    factor_b_source: "stdout_int"
    factor_b_label: "usb_block_devices"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "MP-2"
    nist_800_171_ref: "3.8.1"

  - id: "MP-3.1"
    parent_control: "MP-3"
    name: "Media Marking"
    check_type: "attestation"
    attestation_prompt: "Confirm all media containing CUI is marked with applicable CUI markings and distribution limitations."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "MP-3"
    nist_800_171_ref: "3.8.4"

  - id: "MP-4.1"
    parent_control: "MP-4"
    name: "Media Storage"
    check_type: "attestation"
    attestation_prompt: "Confirm CUI media is stored in controlled areas with access limited to authorized personnel."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "MP-4"
    nist_800_171_ref: "3.8.5"

  - id: "MP-5.1"
    parent_control: "MP-5"
    name: "Media Transport Encryption"
    check_type: "attestation"
    attestation_prompt: "Confirm CUI on digital media is cryptographically protected during transport outside controlled areas."
    review_interval_days: 180
    uct_category: "POL"
    nist_800_53_ref: "MP-5"
    nist_800_171_ref: "3.8.6"

  - id: "MP-6.1"
    parent_control: "MP-6"
    name: "Media Sanitization - Sanitization Tools Available"
    command: "which shred scrub wipe 2>/dev/null | wc -l"
    factor_a: 1
    factor_a_label: "min_sanitization_tools"
    factor_b_source: "stdout_int"
    factor_b_label: "sanitization_tools_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "MP-6"
    nist_800_171_ref: "3.8.3"

  - id: "MP-7.1"
    parent_control: "MP-7"
    name: "Removable Media Usage - USB Storage Module Blocked"
    command: "lsmod 2>/dev/null | grep -c 'usb_storage' || echo 0"
    factor_a: 0
    factor_a_label: "max_usb_storage_modules"
    factor_b_source: "stdout_int"
    factor_b_label: "usb_storage_modules_loaded"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "MP-7"
    nist_800_171_ref: "3.8.7"

  - id: "MP-8.1"
    parent_control: "MP-8"
    name: "Media Disposal"
    check_type: "attestation"
    attestation_prompt: "Confirm media containing CUI is sanitized or destroyed before disposal or release, with disposal records maintained."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "MP-8"
    nist_800_171_ref: "3.8.3"
