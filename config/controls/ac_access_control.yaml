family: "AC"
family_name: "Access Control"
controls:
  - id: "AC-1.1"
    parent_control: "AC-1"
    name: "Access Control Policy Document"
    description: "Organization maintains a current access control policy"
    check_type: "policy_file"
    policy_path: "/opt/axiom/policies/ac-access-control.md"
    policy_template: "ac-access-control"
    command: "FILE=/opt/axiom/policies/ac-access-control.md; test -f \"$FILE\" && echo $(( ($(date +%s) - $(stat -c %Y \"$FILE\")) / 86400 )) || echo 9999"
    factor_a: 365
    factor_a_label: "max_policy_age_days"
    factor_b_source: "stdout_int"
    factor_b_label: "policy_age_days"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    attestation_prompt: "Confirm your organization has a current access control policy."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "AC-1"
    nist_800_171_ref: "3.1.1"

  - id: "AC-2.1"
    parent_control: "AC-2"
    name: "Account Management - Empty Password Accounts"
    command: "awk -F: '$2 == \"\" {count++} END {print count+0}' /etc/shadow 2>/dev/null || echo 0"
    factor_a: 0
    factor_a_label: "max_empty_password_accounts"
    factor_b_source: "stdout_int"
    factor_b_label: "empty_password_accounts"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-2"
    nist_800_171_ref: "3.1.1"

  - id: "AC-2.2"
    parent_control: "AC-2"
    name: "Account Management - UID 0 Accounts"
    command: "awk -F: '$3 == 0 {count++} END {print count+0}' /etc/passwd 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "max_uid_zero_accounts"
    factor_b_source: "stdout_int"
    factor_b_label: "uid_zero_accounts"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-2"
    nist_800_171_ref: "3.1.1"

  - id: "AC-2.3"
    parent_control: "AC-2"
    name: "Account Management - Inactive System Accounts"
    command: "awk -F: '$7 !~ /nologin|false/ && $3 >= 1000 {count++} END {print count+0}' /etc/passwd 2>/dev/null || echo 0"
    factor_a: 10
    factor_a_label: "max_interactive_accounts"
    factor_b_source: "stdout_int"
    factor_b_label: "interactive_accounts"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-2"
    nist_800_171_ref: "3.1.1"

  - id: "AC-3.1"
    parent_control: "AC-3"
    name: "Access Enforcement - World-Writable Files in /etc"
    command: "find /etc -maxdepth 2 -type f -perm -0002 2>/dev/null | wc -l"
    factor_a: 0
    factor_a_label: "max_world_writable_etc_files"
    factor_b_source: "stdout_int"
    factor_b_label: "world_writable_etc_files"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-3"
    nist_800_171_ref: "3.1.1"

  - id: "AC-4.1"
    parent_control: "AC-4"
    name: "Information Flow - IP Forward Controlled by Firewall"
    command: "iptables -L FORWARD -n 2>/dev/null | grep -c 'DROP\\|DOCKER' || echo 0"
    factor_a: 1
    factor_a_label: "forward_chain_controlled"
    factor_b_source: "stdout_int"
    factor_b_label: "forward_rules_present"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-4"
    nist_800_171_ref: "3.1.3"

  - id: "AC-5.1"
    parent_control: "AC-5"
    name: "Separation of Duties - Root Account Direct Login Disabled"
    command: "passwd -S root 2>/dev/null | grep -c 'L' || echo 0"
    factor_a: 1
    factor_a_label: "root_locked_required"
    factor_b_source: "stdout_int"
    factor_b_label: "root_account_locked"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-5"
    nist_800_171_ref: "3.1.4"

  - id: "AC-6.1"
    parent_control: "AC-6"
    name: "Least Privilege - Sudoers Count"
    command: "grep -c '^[^#]' /etc/sudoers 2>/dev/null; exit 0"
    factor_a: 15
    factor_a_label: "max_sudoers_entries"
    factor_b_source: "stdout_int"
    factor_b_label: "actual_sudoers_entries"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-6"
    nist_800_171_ref: "3.1.5"

  - id: "AC-6.2"
    parent_control: "AC-6"
    name: "Least Privilege - SUID Binaries Count"
    command: "find /usr -type f -perm -4000 2>/dev/null | wc -l"
    factor_a: 50
    factor_a_label: "max_suid_binaries"
    factor_b_source: "stdout_int"
    factor_b_label: "suid_binaries_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-6"
    nist_800_171_ref: "3.1.5"

  - id: "AC-6.3"
    parent_control: "AC-6"
    name: "Least Privilege - SGID Binaries Count"
    command: "find /usr -type f -perm -2000 2>/dev/null | wc -l"
    factor_a: 35
    factor_a_label: "max_sgid_binaries"
    factor_b_source: "stdout_int"
    factor_b_label: "sgid_binaries_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-6"
    nist_800_171_ref: "3.1.5"

  - id: "AC-7.1"
    parent_control: "AC-7"
    name: "Unsuccessful Logon Attempts - Account Lockout Configured"
    command: "grep -c 'pam_tally2\\|pam_faillock' /etc/pam.d/common-auth 2>/dev/null || grep -c 'pam_tally2\\|pam_faillock' /etc/pam.d/system-auth 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "lockout_module_required"
    factor_b_source: "stdout_int"
    factor_b_label: "lockout_module_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-7"
    nist_800_171_ref: "3.1.8"

  - id: "AC-8.1"
    parent_control: "AC-8"
    name: "System Use Notification - Login Banner"
    command: "bf=$(sshd -T 2>/dev/null | grep -oP '^banner\\s+\\K/\\S+' || grep -oP '^\\s*Banner\\s+\\K/\\S+' /etc/ssh/sshd_config 2>/dev/null); [ -z \"$bf\" ] && bf=/etc/issue; grep -ic 'U.S. Government\\|USG.*Information System\\|You are accessing a\\|AUTHORIZED USE ONLY\\|unauthorized access\\|consent to monitoring' \"$bf\" 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "dod_banner_content_required"
    factor_b_source: "stdout_int"
    factor_b_label: "security_banner_phrases_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-8"
    nist_800_171_ref: "3.1.9"

  - id: "AC-11.1"
    parent_control: "AC-11"
    name: "Session Lock - SSH Idle Timeout"
    command: "sshd -T 2>/dev/null | grep -oP 'clientaliveinterval\\s+\\K[0-9]+' || grep -oP 'ClientAliveInterval\\s+\\K[0-9]+' /etc/ssh/sshd_config 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "idle_timeout_required"
    factor_b_source: "stdout_int"
    factor_b_label: "idle_timeout_seconds"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-11"
    nist_800_171_ref: "3.1.10"

  - id: "AC-17.1"
    parent_control: "AC-17"
    name: "Remote Access - SSH Protocol Enforcement"
    command: "sshd -T 2>/dev/null | grep -ic 'protocol 2' || echo 1"
    factor_a: 1
    factor_a_label: "ssh_protocol_v2_required"
    factor_b_source: "stdout_int"
    factor_b_label: "ssh_protocol_v2_enforced"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "AC-17"
    nist_800_171_ref: "3.1.12"
