family: "SC"
family_name: "System and Communications Protection"
controls:
  - id: "SC-5.1"
    parent_control: "SC-5"
    name: "Denial of Service Protection - SYN Cookies Enabled"
    command: "cat /proc/sys/net/ipv4/tcp_syncookies 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "syn_cookies_required"
    factor_b_source: "stdout_int"
    factor_b_label: "syn_cookies_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-5"
    nist_800_171_ref: "3.13.1"

  - id: "SC-7.6"
    parent_control: "SC-7"
    name: "Boundary Protection - Listening Services"
    command: "ss -tlnp 2>/dev/null | tail -n +2 | wc -l"
    factor_a: 15
    factor_a_label: "max_listening_services"
    factor_b_source: "stdout_int"
    factor_b_label: "actual_listening_services"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "SC-7.7"
    parent_control: "SC-7"
    name: "Boundary Protection - Firewall Active"
    command: "ufw status 2>/dev/null | grep -c 'active' || iptables -L 2>/dev/null | grep -c 'Chain' || echo 0"
    factor_a: 1
    factor_a_label: "firewall_required"
    factor_b_source: "stdout_int"
    factor_b_label: "firewall_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "SC-7.8"
    parent_control: "SC-7"
    name: "Boundary Protection - Default Deny INPUT Policy"
    command: "iptables -L INPUT 2>/dev/null | head -1 | grep -c 'DROP\\|REJECT' || echo 0"
    factor_a: 1
    factor_a_label: "default_deny_required"
    factor_b_source: "stdout_int"
    factor_b_label: "default_deny_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-7"
    nist_800_171_ref: "3.13.1"

  - id: "SC-8.1"
    parent_control: "SC-8"
    name: "Transmission Confidentiality - TLS Configuration"
    command: "grep -r -l 'ssl\\|tls\\|SSLEngine\\|ssl_certificate' /etc/nginx/ /etc/apache2/ /etc/ssl/ 2>/dev/null | wc -l"
    factor_a: 1
    factor_a_label: "min_tls_config_files"
    factor_b_source: "stdout_int"
    factor_b_label: "tls_config_files_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-8"
    nist_800_171_ref: "3.13.8"

  - id: "SC-8.2"
    parent_control: "SC-8"
    name: "Transmission Confidentiality - Weak SSL Protocols Disabled"
    command: "sshd -T 2>/dev/null | grep -ic 'protocol 2' || echo 1; openssl s_client -connect localhost:443 -tls1 </dev/null 2>&1 | grep -c 'Protocol.*TLSv1$' || echo 0"
    factor_a: 0
    factor_a_label: "max_weak_protocols"
    factor_b_source: "stdout_int"
    factor_b_label: "weak_protocols_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-8"
    nist_800_171_ref: "3.13.8"

  - id: "SC-10.1"
    parent_control: "SC-10"
    name: "Network Disconnect - TCP Keepalive Configuration"
    command: "cat /proc/sys/net/ipv4/tcp_keepalive_time 2>/dev/null || echo 7200"
    factor_a: 600
    factor_a_label: "max_keepalive_seconds"
    factor_b_source: "stdout_int"
    factor_b_label: "keepalive_seconds"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-10"
    nist_800_171_ref: "3.13.9"

  - id: "SC-12.1"
    parent_control: "SC-12"
    name: "Cryptographic Key Management - SSH Crypto Settings"
    command: "sshd -T 2>/dev/null | grep -c 'protocol 2\\|kexalgorithms' || grep -c 'Protocol\\|KexAlgorithms' /etc/ssh/sshd_config 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "min_crypto_settings"
    factor_b_source: "stdout_int"
    factor_b_label: "crypto_settings_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-12"
    nist_800_171_ref: "3.13.10"

  - id: "SC-28.1"
    parent_control: "SC-28"
    name: "Protection of Information at Rest - Encrypted Partitions"
    command: "lsblk -o TYPE 2>/dev/null | grep -c 'crypt' || dmsetup ls --target crypt 2>/dev/null | grep -cv 'No devices' || echo 0"
    factor_a: 1
    factor_a_label: "min_encrypted_partitions"
    factor_b_source: "stdout_int"
    factor_b_label: "encrypted_partitions_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "NETWORK"
    nist_800_53_ref: "SC-28"
    nist_800_171_ref: "3.13.16"
