family: "SI"
family_name: "System and Information Integrity"
controls:
  - id: "SI-2.1"
    parent_control: "SI-2"
    name: "Flaw Remediation - Pending Security Updates"
    command: "apt list --upgradable 2>/dev/null | grep -c 'security' || echo 0"
    factor_a: 10
    factor_a_label: "max_pending_security_updates"
    factor_b_source: "stdout_int"
    factor_b_label: "pending_security_updates"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-2"
    nist_800_171_ref: "3.14.1"

  - id: "SI-2.2"
    parent_control: "SI-2"
    name: "Flaw Remediation - Automatic Updates Enabled"
    command: "systemctl is-enabled unattended-upgrades 2>/dev/null | grep -c 'enabled' || dpkg -l unattended-upgrades 2>/dev/null | grep -c '^ii' || echo 0"
    factor_a: 1
    factor_a_label: "auto_updates_required"
    factor_b_source: "stdout_int"
    factor_b_label: "auto_updates_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-2"
    nist_800_171_ref: "3.14.1"

  - id: "SI-2.3"
    parent_control: "SI-2"
    name: "Flaw Remediation - System Reboot Required"
    command: "test -f /var/run/reboot-required && echo 1 || echo 0"
    factor_a: 0
    factor_a_label: "reboot_not_required"
    factor_b_source: "stdout_int"
    factor_b_label: "reboot_required"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-2"
    nist_800_171_ref: "3.14.1"

  - id: "SI-3.1"
    parent_control: "SI-3"
    name: "Malicious Code Protection - Antimalware Presence"
    command: "which clamav clamscan rkhunter chkrootkit 2>/dev/null | wc -l"
    factor_a: 1
    factor_a_label: "min_security_scanners"
    factor_b_source: "stdout_int"
    factor_b_label: "security_scanners_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-3"
    nist_800_171_ref: "3.14.2"

  - id: "SI-4.1"
    parent_control: "SI-4"
    name: "System Monitoring - Auditd Active"
    command: "systemctl is-active auditd 2>/dev/null | grep -c 'active' || echo 0"
    factor_a: 1
    factor_a_label: "auditd_required"
    factor_b_source: "stdout_int"
    factor_b_label: "auditd_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-4"
    nist_800_171_ref: "3.14.6"

  - id: "SI-4.2"
    parent_control: "SI-4"
    name: "System Monitoring - Audit Rules Count"
    command: "auditctl -l 2>/dev/null | wc -l || echo 0"
    factor_a: 5
    factor_a_label: "min_audit_rules"
    factor_b_source: "stdout_int"
    factor_b_label: "audit_rules_count"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-4"
    nist_800_171_ref: "3.14.6"

  - id: "SI-6.1"
    parent_control: "SI-6"
    name: "Security Function Verification - AppArmor or SELinux Active"
    command: "aa-status --enabled 2>/dev/null && echo 1 || getenforce 2>/dev/null | grep -ic 'enforcing' || echo 0"
    factor_a: 1
    factor_a_label: "mac_required"
    factor_b_source: "stdout_int"
    factor_b_label: "mac_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-6"
    nist_800_171_ref: "3.14.6"

  - id: "SI-7.1"
    parent_control: "SI-7"
    name: "Software and Information Integrity - File Integrity Tool"
    command: "which aide tripwire osqueryi 2>/dev/null | wc -l; dpkg -l 2>/dev/null | grep -c 'aide\\|tripwire\\|osquery' || true"
    factor_a: 1
    factor_a_label: "file_integrity_tool_required"
    factor_b_source: "stdout_int"
    factor_b_label: "file_integrity_tools_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-7"
    nist_800_171_ref: "3.14.6"

  - id: "SI-7.2"
    parent_control: "SI-7"
    name: "Software Integrity - Package Verification"
    command: "dpkg --audit 2>/dev/null | grep -c 'packages' || echo 0"
    factor_a: 10
    factor_a_label: "max_modified_packages"
    factor_b_source: "stdout_int"
    factor_b_label: "modified_packages_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "INTEGRITY"
    nist_800_53_ref: "SI-7"
    nist_800_171_ref: "3.14.6"
