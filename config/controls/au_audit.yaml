family: "AU"
family_name: "Audit and Accountability"
controls:
  - id: "AU-2.1"
    parent_control: "AU-2"
    name: "Audit Events - Logging Service Active"
    command: "systemctl is-active rsyslog 2>/dev/null | grep -c 'active' || systemctl is-active syslog 2>/dev/null | grep -c 'active' || echo 0"
    factor_a: 1
    factor_a_label: "logging_service_required"
    factor_b_source: "stdout_int"
    factor_b_label: "logging_service_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-2"
    nist_800_171_ref: "3.3.1"

  - id: "AU-3.1"
    parent_control: "AU-3"
    name: "Content of Audit Records - Auditd Rules Configured"
    command: "auditctl -l 2>/dev/null | grep -cv '^No rules' || echo 0"
    factor_a: 1
    factor_a_label: "min_audit_rules"
    factor_b_source: "stdout_int"
    factor_b_label: "audit_rules_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-3"
    nist_800_171_ref: "3.3.1"

  - id: "AU-4.1"
    parent_control: "AU-4"
    name: "Audit Storage Capacity - Log Partition Free Percent"
    command: "df /var/log 2>/dev/null | awk 'NR==2 {gsub(/%/,\"\",$5); print 100-$5}'"
    factor_a: 20
    factor_a_label: "min_free_percent"
    factor_b_source: "stdout_int"
    factor_b_label: "actual_free_percent"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-4"
    nist_800_171_ref: "3.3.4"

  - id: "AU-5.1"
    parent_control: "AU-5"
    name: "Response to Audit Failures - Disk Full Action Configured"
    command: "grep -c 'disk_full_action' /etc/audit/auditd.conf 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "disk_full_action_required"
    factor_b_source: "stdout_int"
    factor_b_label: "disk_full_action_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-5"
    nist_800_171_ref: "3.3.4"

  - id: "AU-6.1"
    parent_control: "AU-6"
    name: "Audit Review - Log Rotation Configured"
    command: "find /etc/logrotate.d/ -maxdepth 1 -type f 2>/dev/null | wc -l"
    factor_a: 1
    factor_a_label: "min_logrotate_configs"
    factor_b_source: "stdout_int"
    factor_b_label: "logrotate_configs_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-6"
    nist_800_171_ref: "3.3.5"

  - id: "AU-8.1"
    parent_control: "AU-8"
    name: "Time Stamps - NTP Synchronization Active"
    command: "timedatectl show 2>/dev/null | grep -c 'NTPSynchronized=yes' || systemctl is-active ntp 2>/dev/null | grep -c 'active' || systemctl is-active chronyd 2>/dev/null | grep -c 'active' || echo 0"
    factor_a: 1
    factor_a_label: "ntp_sync_required"
    factor_b_source: "stdout_int"
    factor_b_label: "ntp_synchronized"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-8"
    nist_800_171_ref: "3.3.7"

  - id: "AU-9.1"
    parent_control: "AU-9"
    name: "Protection of Audit Information - Log File Permissions"
    command: "find /var/log -maxdepth 1 \\( -name 'syslog' -o -name 'auth.log' \\) -exec stat -c '%a' {} + 2>/dev/null | awk '{if($1<=640) ok++} END {print ok+0}'"
    factor_a: 1
    factor_a_label: "min_protected_log_files"
    factor_b_source: "stdout_int"
    factor_b_label: "protected_log_files"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-9"
    nist_800_171_ref: "3.3.8"

  - id: "AU-12.1"
    parent_control: "AU-12"
    name: "Audit Generation - Auditd Service Active"
    command: "systemctl is-active auditd 2>/dev/null | grep -c 'active' || echo 0"
    factor_a: 1
    factor_a_label: "auditd_required"
    factor_b_source: "stdout_int"
    factor_b_label: "auditd_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AUDIT"
    nist_800_53_ref: "AU-12"
    nist_800_171_ref: "3.3.1"
