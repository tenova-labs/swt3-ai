family: "AI"
family_name: "AI Governance & Inference Integrity"
controls:
  # ── Technical Controls (automated via AI witness pipeline) ──────

  - id: "AI-1.1"
    parent_control: "AI-1"
    name: "Inference Provenance - Prompt Hashing"
    description: "All AI inference prompts are SHA-256 hashed and anchored to the SWT3 ledger"
    command: "/opt/axiom/tools/axiom-ai-witness --check prompt-hashing"
    factor_a: 1
    factor_a_label: "prompt_hashing_required"
    factor_b_source: "api_check"
    factor_b_label: "prompt_hashing_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AI"
    nist_800_53_ref: "SI-7"
    nist_ai_rmf_ref: "MEASURE 2.6"

  - id: "AI-1.2"
    parent_control: "AI-1"
    name: "Inference Provenance - Response Anchoring"
    description: "All AI inference responses are SHA-256 hashed and anchored to the SWT3 ledger"
    command: "/opt/axiom/tools/axiom-ai-witness --check response-anchoring"
    factor_a: 1
    factor_a_label: "response_anchoring_required"
    factor_b_source: "api_check"
    factor_b_label: "response_anchoring_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AI"
    nist_800_53_ref: "SI-7"
    nist_ai_rmf_ref: "MEASURE 2.6"

  - id: "AI-1.3"
    parent_control: "AI-1"
    name: "Inference Provenance - Model Identifier Recorded"
    description: "Model identifier (name + version) is captured with each inference anchor"
    command: "/opt/axiom/tools/axiom-ai-witness --check model-identifier"
    factor_a: 1
    factor_a_label: "model_id_required"
    factor_b_source: "api_check"
    factor_b_label: "model_id_present"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AI"
    nist_800_53_ref: "AU-3"
    nist_ai_rmf_ref: "MAP 3.5"

  - id: "AI-2.1"
    parent_control: "AI-2"
    name: "Inference Logging - Witness Anchor Minting"
    description: "Each AI inference produces a cryptographic SWT3 Witness Anchor in the ledger"
    command: "/opt/axiom/tools/axiom-ai-witness --check witness-minting"
    factor_a: 1
    factor_a_label: "witness_minting_required"
    factor_b_source: "api_check"
    factor_b_label: "witness_minting_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AI"
    nist_800_53_ref: "AU-2"
    nist_ai_rmf_ref: "GOVERN 1.7"

  - id: "AI-2.2"
    parent_control: "AI-2"
    name: "Inference Logging - Latency Threshold"
    description: "AI inference latency is captured and stays within defined threshold (< 30s)"
    command: "/opt/axiom/tools/axiom-ai-witness --check latency-threshold"
    factor_a: 30000
    factor_a_label: "max_latency_ms"
    factor_b_source: "api_check"
    factor_b_label: "p95_latency_ms"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "AI"
    nist_800_53_ref: "SI-4"
    nist_ai_rmf_ref: "MEASURE 2.5"

  - id: "AI-2.3"
    parent_control: "AI-2"
    name: "Inference Logging - Token Usage Tracking"
    description: "Token consumption (input + output) is recorded per inference"
    command: "/opt/axiom/tools/axiom-ai-witness --check token-tracking"
    factor_a: 1
    factor_a_label: "token_tracking_required"
    factor_b_source: "api_check"
    factor_b_label: "token_tracking_active"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "AI"
    nist_800_53_ref: "AU-3"
    nist_ai_rmf_ref: "MEASURE 2.5"

  # ── Attestation Controls (organizational/procedural) ────────────

  - id: "AI-3.1"
    parent_control: "AI-3"
    name: "AI Risk Management Framework"
    check_type: "attestation"
    description: "Organization has adopted an AI risk management framework aligned with NIST AI RMF"
    attestation_prompt: "Confirm your organization has adopted a documented AI risk management framework."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "PL-2"
    nist_ai_rmf_ref: "GOVERN 1.1"

  - id: "AI-3.2"
    parent_control: "AI-3"
    name: "AI Model Inventory"
    check_type: "attestation"
    description: "Organization maintains an inventory of all AI/ML models in production"
    attestation_prompt: "Confirm an up-to-date inventory of deployed AI/ML models is maintained."
    review_interval_days: 90
    uct_category: "POL"
    nist_800_53_ref: "CM-8"
    nist_ai_rmf_ref: "GOVERN 1.5"

  - id: "AI-3.3"
    parent_control: "AI-3"
    name: "AI Acceptable Use Policy"
    check_type: "attestation"
    description: "Organization has documented acceptable use policies for AI systems"
    attestation_prompt: "Confirm AI acceptable use policies are documented and communicated to users."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "PL-4"
    nist_ai_rmf_ref: "GOVERN 2.1"

  - id: "AI-4.1"
    parent_control: "AI-4"
    name: "AI Output Review Process"
    check_type: "attestation"
    description: "Human review processes exist for high-impact AI decisions"
    attestation_prompt: "Confirm human-in-the-loop review processes exist for critical AI outputs."
    review_interval_days: 180
    uct_category: "POL"
    nist_800_53_ref: "SI-4"
    nist_ai_rmf_ref: "MANAGE 2.2"

  - id: "AI-4.2"
    parent_control: "AI-4"
    name: "AI Incident Response"
    check_type: "attestation"
    description: "Organization has incident response procedures for AI system failures or misuse"
    attestation_prompt: "Confirm incident response procedures address AI-specific failure modes."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "IR-4"
    nist_ai_rmf_ref: "MANAGE 4.1"

  - id: "AI-4.3"
    parent_control: "AI-4"
    name: "AI Data Governance"
    check_type: "attestation"
    description: "Data used for AI training and inference is governed under data management policies"
    attestation_prompt: "Confirm data governance policies cover AI training data and inference inputs."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "SI-12"
    nist_ai_rmf_ref: "MAP 2.3"
