family: "IA"
family_name: "Identification and Authentication"
controls:
  # -------------------------------------------------------------------
  # IA-2: Identification and Authentication (Organizational Users)
  # DISA Windows Server 2022 STIG: V-254243, V-254244
  # -------------------------------------------------------------------
  - id: "IA-2.1"
    parent_control: "IA-2"
    name: "Identification and Authentication - Local Account Lockout Threshold"
    platform: "windows"
    windows_command: "(net accounts | Select-String 'Lockout threshold' | ForEach-Object { ($_ -split ':\\s+')[1] }) -replace '\\D',''"
    factor_a: 3
    factor_a_label: "max_lockout_threshold"
    factor_b_source: "stdout_int"
    factor_b_label: "lockout_threshold_configured"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-2"
    nist_800_171_ref: "3.5.3"
    disa_stig_id: "V-254243"
    stig_severity: "CAT II"

  - id: "IA-2.3"
    parent_control: "IA-2"
    name: "Administrative Account Inventory - Local Administrators"
    platform: "windows"
    windows_command: "(Get-LocalGroupMember -Group 'Administrators' -ErrorAction SilentlyContinue | Measure-Object).Count"
    factor_a: 5
    factor_a_label: "max_admin_users"
    factor_b_source: "stdout_int"
    factor_b_label: "admin_users_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-2"
    nist_800_171_ref: "3.5.1"
    disa_stig_id: "V-254244"
    stig_severity: "CAT II"

  # -------------------------------------------------------------------
  # IA-5: Authenticator Management
  # DISA Windows Server 2022 STIG: V-254247, V-254248, V-254249, V-254250
  # -------------------------------------------------------------------
  - id: "IA-5.1"
    parent_control: "IA-5"
    name: "Authenticator Management - Password Minimum Length"
    platform: "windows"
    windows_command: "(net accounts | Select-String 'Minimum password length' | ForEach-Object { ($_ -split ':\\s+')[1] }) -replace '\\D',''"
    factor_a: 14
    factor_a_label: "min_password_length_required"
    factor_b_source: "stdout_int"
    factor_b_label: "min_password_length_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.7"
    disa_stig_id: "V-254247"
    stig_severity: "CAT II"

  - id: "IA-5.2"
    parent_control: "IA-5"
    name: "Authenticator Management - Password Complexity Enabled"
    platform: "windows"
    windows_command: "$out = net accounts | Select-String -Pattern 'complexity' -ErrorAction SilentlyContinue; if ($null -ne $out -and $out.ToString() -match 'Enabled') { 1 } else { 0 }"
    factor_a: 1
    factor_a_label: "complexity_required"
    factor_b_source: "stdout_int"
    factor_b_label: "complexity_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.7"
    disa_stig_id: "V-254248"
    stig_severity: "CAT II"

  - id: "IA-5.3"
    parent_control: "IA-5"
    name: "Authenticator Management - Password Maximum Age"
    platform: "windows"
    windows_command: "(net accounts | Select-String 'Maximum password age' | ForEach-Object { ($_ -split ':\\s+')[1] }) -replace '\\D',''"
    factor_a: 60
    factor_a_label: "max_password_age_days"
    factor_b_source: "stdout_int"
    factor_b_label: "configured_max_age_days"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.7"
    disa_stig_id: "V-254249"
    stig_severity: "CAT II"

  - id: "IA-5.4"
    parent_control: "IA-5"
    name: "Authenticator Management - Password History Enforced"
    platform: "windows"
    windows_command: "(net accounts | Select-String 'password history' | ForEach-Object { ($_ -split ':\\s+')[1] }) -replace '\\D',''"
    factor_a: 24
    factor_a_label: "min_password_history"
    factor_b_source: "stdout_int"
    factor_b_label: "password_history_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.8"
    disa_stig_id: "V-254250"
    stig_severity: "CAT II"

  - id: "IA-5.5"
    parent_control: "IA-5"
    name: "Authenticator Management - Password Minimum Age"
    platform: "windows"
    windows_command: "(net accounts | Select-String 'Minimum password age' | ForEach-Object { ($_ -split ':\\s+')[1] }) -replace '\\D',''"
    factor_a: 1
    factor_a_label: "min_password_age_days"
    factor_b_source: "stdout_int"
    factor_b_label: "configured_min_age_days"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.7"
    disa_stig_id: "V-254251"
    stig_severity: "CAT II"

  - id: "IA-5.6"
    parent_control: "IA-5"
    name: "Authenticator Management - Lockout Duration"
    platform: "windows"
    windows_command: "(net accounts | Select-String 'Lockout duration' | ForEach-Object { ($_ -split ':\\s+')[1] }) -replace '\\D',''"
    factor_a: 15
    factor_a_label: "min_lockout_duration_minutes"
    factor_b_source: "stdout_int"
    factor_b_label: "lockout_duration_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.7"
    disa_stig_id: "V-254252"
    stig_severity: "CAT II"

  # -------------------------------------------------------------------
  # IA-4: Identifier Management
  # -------------------------------------------------------------------
  - id: "IA-4.1"
    parent_control: "IA-4"
    name: "Identifier Management - Guest Account Disabled"
    platform: "windows"
    windows_command: "if ((Get-LocalUser -Name 'Guest' -ErrorAction SilentlyContinue).Enabled -eq $false) { 1 } else { 0 }"
    factor_a: 1
    factor_a_label: "guest_disabled_required"
    factor_b_source: "stdout_int"
    factor_b_label: "guest_account_disabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-4"
    nist_800_171_ref: "3.5.5"
    disa_stig_id: "V-254245"
    stig_severity: "CAT I"

  - id: "IA-4.2"
    parent_control: "IA-4"
    name: "Identifier Management - Administrator Account Renamed"
    platform: "windows"
    windows_command: "if ((Get-LocalUser | Where-Object { $_.SID -like '*-500' }).Name -ne 'Administrator') { 1 } else { 0 }"
    factor_a: 1
    factor_a_label: "admin_renamed_required"
    factor_b_source: "stdout_int"
    factor_b_label: "admin_renamed"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-4"
    nist_800_171_ref: "3.5.5"
    disa_stig_id: "V-254246"
    stig_severity: "CAT II"
