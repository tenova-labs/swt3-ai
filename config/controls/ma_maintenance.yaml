family: "MA"
family_name: "Maintenance"
controls:
  - id: "MA-1.1"
    parent_control: "MA-1"
    name: "Maintenance Policy Document"
    check_type: "policy_file"
    policy_path: "/opt/axiom/policies/ma-maintenance.md"
    policy_template: "ma-maintenance"
    command: "FILE=/opt/axiom/policies/ma-maintenance.md; test -f \"$FILE\" && echo $(( ($(date +%s) - $(stat -c %Y \"$FILE\")) / 86400 )) || echo 9999"
    factor_a: 365
    factor_a_label: "max_policy_age_days"
    factor_b_source: "stdout_int"
    factor_b_label: "policy_age_days"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    attestation_prompt: "Confirm your organization has a current maintenance policy."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "MA-1"
    nist_800_171_ref: "3.7.1"

  - id: "MA-2.1"
    parent_control: "MA-2"
    name: "Controlled Maintenance"
    check_type: "attestation"
    attestation_prompt: "Confirm your organization schedules, performs, documents, and reviews maintenance on all information systems."
    review_interval_days: 90
    uct_category: "POL"
    nist_800_53_ref: "MA-2"
    nist_800_171_ref: "3.7.1"

  - id: "MA-3.1"
    parent_control: "MA-3"
    name: "Maintenance Tools - Integrity Tools Installed"
    command: "which aide tripwire rkhunter chkrootkit 2>/dev/null | wc -l"
    factor_a: 1
    factor_a_label: "min_integrity_tools"
    factor_b_source: "stdout_int"
    factor_b_label: "integrity_tools_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "MA-3"
    nist_800_171_ref: "3.7.1"

  - id: "MA-3.2"
    parent_control: "MA-3"
    name: "Maintenance Tool Inspection"
    check_type: "attestation"
    attestation_prompt: "Confirm all maintenance tools are inspected for improper or unauthorized modifications before use on information systems."
    review_interval_days: 180
    uct_category: "POL"
    nist_800_53_ref: "MA-3"
    nist_800_171_ref: "3.7.2"

  - id: "MA-5.1"
    parent_control: "MA-5"
    name: "Maintenance Personnel Authorization"
    check_type: "attestation"
    attestation_prompt: "Confirm maintenance personnel are authorized, supervised when necessary, and that maintenance activities are logged."
    review_interval_days: 365
    uct_category: "POL"
    nist_800_53_ref: "MA-5"
    nist_800_171_ref: "3.7.5"

  - id: "MA-6.1"
    parent_control: "MA-6"
    name: "Timely Maintenance - Recent Maintenance Activity"
    command: "grep -c 'Start-Date' /var/log/apt/history.log 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "min_maintenance_events"
    factor_b_source: "stdout_int"
    factor_b_label: "maintenance_events_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "CONFIGURATION"
    nist_800_53_ref: "MA-6"
    nist_800_171_ref: "3.7.6"
