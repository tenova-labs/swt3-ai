family: "IA"
family_name: "Identification and Authentication"
controls:
  - id: "IA-2.1"
    parent_control: "IA-2"
    name: "Identification and Authentication - SSH Key Auth Enabled"
    command: "sshd -T 2>/dev/null | grep -ic 'pubkeyauthentication yes' || grep -ic 'PubkeyAuthentication.*yes' /etc/ssh/sshd_config 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "pubkey_auth_required"
    factor_b_source: "stdout_int"
    factor_b_label: "pubkey_auth_enabled"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-2"
    nist_800_171_ref: "3.5.3"

  - id: "IA-2.2"
    parent_control: "IA-2"
    name: "Multi-Factor Authentication - PAM MFA Module"
    command: "grep -c 'pam_google_authenticator\\|pam_duo\\|pam_u2f\\|pam_yubico' /etc/pam.d/sshd 2>/dev/null || grep -c 'pam_google_authenticator\\|pam_duo\\|pam_u2f' /etc/pam.d/common-auth 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "mfa_module_required"
    factor_b_source: "stdout_int"
    factor_b_label: "mfa_modules_found"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-2"
    nist_800_171_ref: "3.5.3"

  - id: "IA-4.1"
    parent_control: "IA-4"
    name: "Identifier Management - No Duplicate UIDs"
    command: "awk -F: '{print $3}' /etc/passwd 2>/dev/null | sort | uniq -d | wc -l"
    factor_a: 0
    factor_a_label: "max_duplicate_uids"
    factor_b_source: "stdout_int"
    factor_b_label: "duplicate_uids_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-4"
    nist_800_171_ref: "3.5.5"

  - id: "IA-4.2"
    parent_control: "IA-4"
    name: "Identifier Management - No Duplicate UIDs or GIDs"
    command: "echo $(( $(awk -F: '{print $3}' /etc/passwd 2>/dev/null | sort | uniq -d | wc -l) + $(awk -F: '{print $3}' /etc/group 2>/dev/null | sort | uniq -d | wc -l) ))"
    factor_a: 0
    factor_a_label: "max_duplicate_ids"
    factor_b_source: "stdout_int"
    factor_b_label: "duplicate_uid_gid_count"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-4"
    nist_800_171_ref: "3.5.5"

  - id: "IA-5.1"
    parent_control: "IA-5"
    name: "Authenticator Management - Password Minimum Length"
    command: "grep -oP 'minlen\\s*=\\s*\\K[0-9]+' /etc/security/pwquality.conf 2>/dev/null || echo 0"
    factor_a: 8
    factor_a_label: "min_password_length_required"
    factor_b_source: "stdout_int"
    factor_b_label: "min_password_length_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.7"

  - id: "IA-5.2"
    parent_control: "IA-5"
    name: "Authenticator Management - Password Complexity Enforced"
    command: "grep -cP '^\\s*(ucredit|lcredit|dcredit|ocredit)\\s*=\\s*-[0-9]' /etc/security/pwquality.conf 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "min_complexity_rules_required"
    factor_b_source: "stdout_int"
    factor_b_label: "complexity_rules_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.7"

  - id: "IA-5.3"
    parent_control: "IA-5"
    name: "Authenticator Management - Password Maximum Age"
    command: "grep -oP 'PASS_MAX_DAYS\\s+\\K[0-9]+' /etc/login.defs 2>/dev/null || echo 99999"
    factor_a: 90
    factor_a_label: "max_password_age_days"
    factor_b_source: "stdout_int"
    factor_b_label: "configured_max_age_days"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.7"

  - id: "IA-5.4"
    parent_control: "IA-5"
    name: "Authenticator Management - Password History Enforced"
    command: "grep -oP 'remember=\\K[0-9]+' /etc/pam.d/common-password 2>/dev/null || echo 0"
    factor_a: 5
    factor_a_label: "min_password_history"
    factor_b_source: "stdout_int"
    factor_b_label: "password_history_configured"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.8"

  - id: "IA-5.5"
    parent_control: "IA-5"
    name: "Authenticator Management - Password Minimum Age"
    command: "grep -oP 'PASS_MIN_DAYS\\s+\\K[0-9]+' /etc/login.defs 2>/dev/null || echo 0"
    factor_a: 1
    factor_a_label: "min_password_age_days"
    factor_b_source: "stdout_int"
    factor_b_label: "configured_min_age_days"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.7"

  - id: "IA-5.6"
    parent_control: "IA-5"
    name: "Authenticator Management - Password Warn Age"
    command: "grep -oP 'PASS_WARN_AGE\\s+\\K[0-9]+' /etc/login.defs 2>/dev/null || echo 0"
    factor_a: 7
    factor_a_label: "min_password_warn_days"
    factor_b_source: "stdout_int"
    factor_b_label: "configured_warn_days"
    factor_c_source: "none"
    rule_expression: "factor_b >= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-5"
    nist_800_171_ref: "3.5.7"

  - id: "IA-2.3"
    parent_control: "IA-2"
    name: "Administrative Account Inventory - Sudo/Root Group Members"
    command: "getent group sudo root wheel 2>/dev/null | awk -F: '{n+=split($4,a,\",\")} END {print n+0}'"
    factor_a: 5
    factor_a_label: "max_admin_users"
    factor_b_source: "stdout_int"
    factor_b_label: "admin_users_found"
    factor_c_source: "none"
    rule_expression: "factor_b <= factor_a"
    uct_category: "ACCESS"
    nist_800_53_ref: "IA-2"
    nist_800_171_ref: "3.5.1"
